<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panelFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="inverterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <g fill="#4ade80" opacity="0.03">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/><circle cx="250" cy="50" r="2"/>
    <circle cx="350" cy="50" r="2"/><circle cx="450" cy="50" r="2"/><circle cx="550" cy="50" r="2"/>
    <circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/><circle cx="850" cy="50" r="2"/>
    <circle cx="950" cy="50" r="2"/><circle cx="1050" cy="50" r="2"/><circle cx="1150" cy="50" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="250" cy="150" r="2"/>
    <circle cx="350" cy="150" r="2"/><circle cx="450" cy="150" r="2"/><circle cx="550" cy="150" r="2"/>
    <circle cx="650" cy="150" r="2"/><circle cx="750" cy="150" r="2"/><circle cx="850" cy="150" r="2"/>
    <circle cx="950" cy="150" r="2"/><circle cx="1050" cy="150" r="2"/><circle cx="1150" cy="150" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="150" cy="250" r="2"/><circle cx="250" cy="250" r="2"/>
    <circle cx="350" cy="250" r="2"/><circle cx="450" cy="250" r="2"/><circle cx="550" cy="250" r="2"/>
    <circle cx="650" cy="250" r="2"/><circle cx="750" cy="250" r="2"/><circle cx="850" cy="250" r="2"/>
    <circle cx="950" cy="250" r="2"/><circle cx="1050" cy="250" r="2"/><circle cx="1150" cy="250" r="2"/>
  </g>

  <!-- Sun with glow -->
  <g transform="translate(200, 160)">
    <!-- Outer glow rings -->
    <circle cx="0" cy="0" r="140" fill="url(#sunGlow)"/>
    <circle cx="0" cy="0" r="105" fill="#fbbf24" opacity="0.06"/>

    <!-- Sun rays -->
    <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-95" x2="0" y2="-120"/>
      <line x1="67" y1="-67" x2="85" y2="-85"/>
      <line x1="95" y1="0" x2="120" y2="0"/>
      <line x1="67" y1="67" x2="85" y2="85"/>
      <line x1="0" y1="95" x2="0" y2="120"/>
      <line x1="-67" y1="67" x2="-85" y2="85"/>
      <line x1="-95" y1="0" x2="-120" y2="0"/>
      <line x1="-67" y1="-67" x2="-85" y2="-85"/>
    </g>

    <!-- Secondary shorter rays -->
    <g stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.45">
      <line x1="46" y1="-86" x2="56" y2="-104"/>
      <line x1="86" y1="-46" x2="104" y2="-56"/>
      <line x1="86" y1="46" x2="104" y2="56"/>
      <line x1="46" y1="86" x2="56" y2="104"/>
      <line x1="-46" y1="86" x2="-56" y2="104"/>
      <line x1="-86" y1="46" x2="-104" y2="56"/>
      <line x1="-86" y1="-46" x2="-104" y2="-56"/>
      <line x1="-46" y1="-86" x2="-56" y2="-104"/>
    </g>

    <!-- Sun body -->
    <circle cx="0" cy="0" r="70" fill="url(#sunGrad)"/>
    <!-- Sun face highlight -->
    <circle cx="-15" cy="-15" r="35" fill="#fde68a" opacity="0.3"/>
  </g>

  <!-- Sunbeams going to panels (energy flow) -->
  <g stroke="#fbbf24" stroke-width="1.5" opacity="0.2" stroke-dasharray="8 6">
    <line x1="280" y1="200" x2="500" y2="280">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="230" x2="540" y2="310">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="260" y1="260" x2="480" y2="330">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Roof with panels (main element, center-right) -->
  <g transform="translate(460, 220)">
    <!-- Roof shape -->
    <polygon points="300,-40 0,120 600,120" fill="url(#roofGrad)" stroke="#475569" stroke-width="2"/>

    <!-- Solar panel grid on roof (left slope) -->
    <g transform="translate(70, 10)">
      <!-- Row 1 -->
      <rect x="0" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(-24)"/>
      <rect x="78" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(-24)"/>
      <rect x="156" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(-24)"/>
      <!-- Panel grid lines row 1 -->
      <line x1="35" y1="20" x2="35" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
      <line x1="0" y1="42" x2="70" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
      <line x1="113" y1="20" x2="113" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
      <line x1="78" y1="42" x2="148" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
      <line x1="191" y1="20" x2="191" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
      <line x1="156" y1="42" x2="226" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(-24)"/>
    </g>

    <!-- Solar panel grid on roof (right slope) -->
    <g transform="translate(320, 10)">
      <rect x="0" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(24)"/>
      <rect x="78" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(24)"/>
      <rect x="156" y="20" width="70" height="45" rx="2" ry="2" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5" transform="skewY(24)"/>
      <line x1="35" y1="20" x2="35" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
      <line x1="0" y1="42" x2="70" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
      <line x1="113" y1="20" x2="113" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
      <line x1="78" y1="42" x2="148" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
      <line x1="191" y1="20" x2="191" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
      <line x1="156" y1="42" x2="226" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.4" transform="skewY(24)"/>
    </g>

    <!-- House walls below roof -->
    <rect x="50" y="120" width="500" height="250" rx="4" ry="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

    <!-- Windows -->
    <rect x="90" y="160" width="80" height="80" rx="4" ry="4" fill="#0f172a" opacity="0.6" stroke="#334155" stroke-width="1"/>
    <line x1="130" y1="160" x2="130" y2="240" stroke="#334155" stroke-width="0.8"/>
    <line x1="90" y1="200" x2="170" y2="200" stroke="#334155" stroke-width="0.8"/>
    <!-- Window glow -->
    <rect x="92" y="162" width="36" height="36" rx="2" ry="2" fill="#fbbf24" opacity="0.08"/>

    <rect x="430" y="160" width="80" height="80" rx="4" ry="4" fill="#0f172a" opacity="0.6" stroke="#334155" stroke-width="1"/>
    <line x1="470" y1="160" x2="470" y2="240" stroke="#334155" stroke-width="0.8"/>
    <line x1="430" y1="200" x2="510" y2="200" stroke="#334155" stroke-width="0.8"/>
    <rect x="432" y="162" width="36" height="36" rx="2" ry="2" fill="#fbbf24" opacity="0.08"/>

    <!-- Door -->
    <rect x="250" y="270" width="100" height="100" rx="4" ry="4" fill="#0f172a" opacity="0.5" stroke="#334155" stroke-width="1.5"/>
    <circle cx="335" cy="325" r="5" fill="#475569"/>
  </g>

  <!-- Inverter box (right side of house) -->
  <g transform="translate(950, 380)">
    <rect x="0" y="0" width="100" height="130" rx="8" ry="8" fill="url(#inverterGrad)" opacity="0.9"/>
    <!-- Inverter details -->
    <rect x="12" y="15" width="76" height="35" rx="4" ry="4" fill="#0f172a" opacity="0.5"/>
    <!-- LED indicators -->
    <circle cx="25" cy="32" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="42" cy="32" r="4" fill="#4ade80" opacity="0.5"/>
    <circle cx="59" cy="32" r="4" fill="#22c55e" opacity="0.3"/>
    <!-- Heat sink lines -->
    <line x1="15" y1="65" x2="85" y2="65" stroke="#0f172a" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="75" x2="85" y2="75" stroke="#0f172a" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="85" x2="85" y2="85" stroke="#0f172a" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="95" x2="85" y2="95" stroke="#0f172a" stroke-width="2" opacity="0.3"/>
    <line x1="15" y1="105" x2="85" y2="105" stroke="#0f172a" stroke-width="2" opacity="0.3"/>
    <!-- Connection ports -->
    <circle cx="30" cy="118" r="6" fill="#0f172a" opacity="0.5"/>
    <circle cx="70" cy="118" r="6" fill="#0f172a" opacity="0.5"/>
  </g>

  <!-- Cable from roof to inverter -->
  <path d="M940,380 Q960,350 960,380" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Green leaf (bottom left) -->
  <g transform="translate(100, 430)">
    <!-- Leaf shape -->
    <path d="M60,0 Q120,30 100,100 Q60,80 20,100 Q0,30 60,0 Z" fill="url(#leafGrad)" opacity="0.8"/>
    <!-- Leaf vein center -->
    <path d="M60,10 Q65,50 60,90" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Leaf veins -->
    <path d="M60,30 Q80,35 90,45" stroke="#16a34a" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M60,30 Q40,35 30,45" stroke="#16a34a" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M60,55 Q80,58 88,68" stroke="#16a34a" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M60,55 Q40,58 32,68" stroke="#16a34a" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Stem -->
    <path d="M60,90 Q55,120 40,140" stroke="#16a34a" stroke-width="2.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Second smaller leaf -->
  <g transform="translate(180, 500) scale(0.5)">
    <path d="M60,0 Q120,30 100,100 Q60,80 20,100 Q0,30 60,0 Z" fill="url(#leafGrad)" opacity="0.5"/>
    <path d="M60,10 Q65,50 60,90" stroke="#16a34a" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M60,90 Q55,120 40,140" stroke="#16a34a" stroke-width="2.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Ground-mounted solar panel (bottom center) -->
  <g transform="translate(550, 500)">
    <!-- Stand -->
    <rect x="55" y="30" width="10" height="60" fill="#475569"/>
    <rect x="30" y="85" width="60" height="6" rx="2" ry="2" fill="#475569"/>
    <!-- Panel face, tilted -->
    <g transform="rotate(-25, 60, 30)">
      <rect x="0" y="0" width="120" height="65" rx="3" ry="3" fill="url(#panelFace)" stroke="#22c55e" stroke-width="1.5"/>
      <!-- Grid -->
      <line x1="40" y1="0" x2="40" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
      <line x1="80" y1="0" x2="80" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="22" x2="120" y2="22" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
      <line x1="0" y1="44" x2="120" y2="44" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    </g>
  </g>

  <!-- Energy flow arrows (panels to inverter) -->
  <g opacity="0.5">
    <path d="M920,360 L940,370" stroke="#4ade80" stroke-width="2" fill="none" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="938,364 948,370 938,376" fill="#4ade80" opacity="0.5"/>
  </g>

  <!-- Recycling / sustainability circle indicator (top right) -->
  <g transform="translate(1080, 100)" opacity="0.25">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#22c55e" stroke-width="2"/>
    <!-- Three rotating arrows (recycle symbol) -->
    <path d="M0,-30 L8,-18 L-8,-18 Z" fill="#22c55e" transform="rotate(0, 0, 0)"/>
    <path d="M26,15 L18,27 L34,27 Z" fill="#22c55e" transform="rotate(0, 0, 0)"/>
    <path d="M-26,15 L-34,27 L-18,27 Z" fill="#22c55e" transform="rotate(0, 0, 0)"/>
    <path d="M0,-30 Q20,-20 26,15" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M26,15 Q10,30 -26,15" stroke="#22c55e" stroke-width="2" fill="none"/>
    <path d="M-26,15 Q-20,-20 0,-30" stroke="#22c55e" stroke-width="2" fill="none"/>
  </g>

  <!-- Small floating particles -->
  <circle cx="350" cy="500" r="2" fill="#4ade80" opacity="0.2"/>
  <circle cx="850" cy="180" r="3" fill="#fbbf24" opacity="0.15"/>
  <circle cx="1150" cy="550" r="2" fill="#22c55e" opacity="0.2"/>
  <circle cx="400" cy="80" r="2" fill="#fbbf24" opacity="0.1"/>
  <circle cx="1100" cy="350" r="3" fill="#4ade80" opacity="0.15"/>
</svg>
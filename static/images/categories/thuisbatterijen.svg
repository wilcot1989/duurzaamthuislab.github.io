<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="houseWall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="batteryFill" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="arrowGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial glow behind house -->
  <circle cx="600" cy="350" r="320" fill="#16a34a" opacity="0.04"/>
  <circle cx="600" cy="350" r="220" fill="#22c55e" opacity="0.03"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#4ade80" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- House structure -->
  <g transform="translate(300, 100)">
    <!-- House walls -->
    <rect x="60" y="200" width="480" height="310" rx="6" ry="6" fill="url(#houseWall)" stroke="#334155" stroke-width="2"/>

    <!-- Roof -->
    <polygon points="300,-30 -10,200 610,200" fill="url(#roofGrad)" stroke="#475569" stroke-width="2"/>

    <!-- Solar panels on roof (left slope) -->
    <g transform="translate(80, 50)">
      <!-- Panel row 1 -->
      <rect x="0" y="40" width="80" height="50" rx="3" ry="3" fill="url(#panelGrad)" stroke="#22c55e" stroke-width="1.5" transform="skewY(-22)"/>
      <rect x="90" y="40" width="80" height="50" rx="3" ry="3" fill="url(#panelGrad)" stroke="#22c55e" stroke-width="1.5" transform="skewY(-22)"/>
      <!-- Panel grid lines -->
      <line x1="40" y1="40" x2="40" y2="90" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(-22)"/>
      <line x1="0" y1="65" x2="80" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(-22)"/>
      <line x1="130" y1="40" x2="130" y2="90" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(-22)"/>
      <line x1="90" y1="65" x2="170" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(-22)"/>
    </g>

    <!-- Solar panels on roof (right slope) -->
    <g transform="translate(370, 50)">
      <rect x="0" y="40" width="80" height="50" rx="3" ry="3" fill="url(#panelGrad)" stroke="#22c55e" stroke-width="1.5" transform="skewY(22)"/>
      <rect x="90" y="40" width="80" height="50" rx="3" ry="3" fill="url(#panelGrad)" stroke="#22c55e" stroke-width="1.5" transform="skewY(22)"/>
      <line x1="40" y1="40" x2="40" y2="90" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(22)"/>
      <line x1="0" y1="65" x2="80" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(22)"/>
      <line x1="130" y1="40" x2="130" y2="90" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(22)"/>
      <line x1="90" y1="65" x2="170" y2="65" stroke="#22c55e" stroke-width="0.5" opacity="0.5" transform="skewY(22)"/>
    </g>

    <!-- Battery icon centered inside house -->
    <g transform="translate(210, 250)">
      <!-- Battery outer shell -->
      <rect x="0" y="20" width="180" height="220" rx="16" ry="16" fill="none" stroke="#22c55e" stroke-width="4"/>
      <!-- Battery terminal -->
      <rect x="55" y="0" width="70" height="28" rx="8" ry="8" fill="none" stroke="#22c55e" stroke-width="4"/>
      <!-- Battery charge level fill -->
      <rect x="14" y="70" width="152" height="158" rx="8" ry="8" fill="url(#batteryFill)" opacity="0.7"/>
      <!-- Charge level lines -->
      <line x1="14" y1="120" x2="166" y2="120" stroke="#0f172a" stroke-width="1.5" opacity="0.3"/>
      <line x1="14" y1="160" x2="166" y2="160" stroke="#0f172a" stroke-width="1.5" opacity="0.3"/>
      <!-- Lightning bolt on battery -->
      <polygon points="100,80 75,150 95,150 70,215 120,135 100,135 125,80" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- Window left -->
    <rect x="100" y="250" width="70" height="70" rx="4" ry="4" fill="#0f172a" opacity="0.6" stroke="#334155" stroke-width="1.5"/>
    <line x1="135" y1="250" x2="135" y2="320" stroke="#334155" stroke-width="1"/>
    <line x1="100" y1="285" x2="170" y2="285" stroke="#334155" stroke-width="1"/>

    <!-- Window right -->
    <rect x="430" y="250" width="70" height="70" rx="4" ry="4" fill="#0f172a" opacity="0.6" stroke="#334155" stroke-width="1.5"/>
    <line x1="465" y1="250" x2="465" y2="320" stroke="#334155" stroke-width="1"/>
    <line x1="430" y1="285" x2="500" y2="285" stroke="#334155" stroke-width="1"/>

    <!-- Door -->
    <rect x="255" y="410" width="90" height="100" rx="4" ry="4" fill="#0f172a" opacity="0.5" stroke="#334155" stroke-width="1.5"/>
    <circle cx="330" cy="465" r="5" fill="#475569"/>
  </g>

  <!-- Power meter (left side) -->
  <g transform="translate(100, 280)">
    <circle cx="60" cy="60" r="58" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
    <circle cx="60" cy="60" r="45" fill="#0f172a"/>
    <!-- Meter dial markings -->
    <line x1="60" y1="20" x2="60" y2="28" stroke="#4ade80" stroke-width="2"/>
    <line x1="30" y1="35" x2="35" y2="42" stroke="#4ade80" stroke-width="2"/>
    <line x1="90" y1="35" x2="85" y2="42" stroke="#4ade80" stroke-width="2"/>
    <line x1="18" y1="60" x2="26" y2="60" stroke="#4ade80" stroke-width="2"/>
    <line x1="102" y1="60" x2="94" y2="60" stroke="#4ade80" stroke-width="2"/>
    <!-- Needle -->
    <line x1="60" y1="60" x2="38" y2="32" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="5" fill="#22c55e"/>
    <!-- kWh indicator dots -->
    <circle cx="45" cy="82" r="3" fill="#4ade80" opacity="0.6"/>
    <circle cx="60" cy="85" r="3" fill="#4ade80" opacity="0.6"/>
    <circle cx="75" cy="82" r="3" fill="#4ade80" opacity="0.6"/>
  </g>

  <!-- Energy flow arrows (solar to battery - top) -->
  <g transform="translate(540, 100)" opacity="0.7">
    <path d="M0,20 L50,20" stroke="url(#arrowGlow)" stroke-width="3" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="50,12 65,20 50,28" fill="#4ade80"/>
  </g>

  <!-- Energy flow arrows (battery to house - right side) -->
  <g transform="translate(830, 340)" opacity="0.6">
    <path d="M0,0 L0,50" stroke="url(#arrowGlow)" stroke-width="3" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="-8,50 0,65 8,50" fill="#4ade80"/>
  </g>

  <!-- Energy flow arrows (meter to house - left) -->
  <g transform="translate(218, 340)" opacity="0.5">
    <path d="M0,0 Q30,-10 60,0" stroke="#4ade80" stroke-width="2.5" fill="none" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
    </path>
    <polygon points="55,-8 68,0 55,8" fill="#4ade80"/>
  </g>

  <!-- Grid connection icon (right side) -->
  <g transform="translate(920, 250)">
    <!-- Power pole -->
    <rect x="28" y="0" width="8" height="180" fill="#475569"/>
    <rect x="5" y="20" width="54" height="6" rx="2" ry="2" fill="#475569"/>
    <rect x="12" y="45" width="40" height="6" rx="2" ry="2" fill="#475569"/>
    <!-- Wires -->
    <path d="M5,23 Q-30,80 28,130" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M59,23 Q90,80 36,130" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Insulators -->
    <circle cx="10" cy="23" r="4" fill="#22c55e" opacity="0.5"/>
    <circle cx="54" cy="23" r="4" fill="#22c55e" opacity="0.5"/>
  </g>

  <!-- Energy flow from grid to house -->
  <g transform="translate(860, 380)" opacity="0.4">
    <path d="M80,0 L30,0" stroke="#4ade80" stroke-width="2" fill="none" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" values="0;20" dur="2s" repeatCount="indefinite"/>
    </path>
    <polygon points="30,-6 18,0 30,6" fill="#4ade80"/>
  </g>

  <!-- Decorative floating particles -->
  <circle cx="100" cy="150" r="3" fill="#4ade80" opacity="0.2"/>
  <circle cx="1100" cy="200" r="4" fill="#22c55e" opacity="0.15"/>
  <circle cx="1050" cy="480" r="3" fill="#4ade80" opacity="0.2"/>
  <circle cx="80" cy="500" r="5" fill="#22c55e" opacity="0.1"/>
  <circle cx="1130" cy="100" r="3" fill="#4ade80" opacity="0.15"/>

  <!-- Ground line -->
  <line x1="200" y1="510" x2="1000" y2="510" stroke="#22c55e" stroke-width="1" opacity="0.15"/>
</svg>
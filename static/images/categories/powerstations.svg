<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="batteryBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="boltGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="tentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#4ade80" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles background -->
  <circle cx="150" cy="100" r="60" fill="#16a34a" opacity="0.08"/>
  <circle cx="1050" cy="530" r="80" fill="#22c55e" opacity="0.06"/>
  <circle cx="950" cy="120" r="45" fill="#4ade80" opacity="0.07"/>

  <!-- Camping tent (background element, left side) -->
  <g transform="translate(120, 300)">
    <!-- Tent body -->
    <polygon points="100,200 0,200 50,-20 100,200" fill="url(#tentGrad)" opacity="0.7"/>
    <polygon points="100,200 200,200 150,-20 100,200" fill="url(#tentGrad)" opacity="0.55"/>
    <!-- Tent opening -->
    <polygon points="75,200 125,200 100,100" fill="#0f172a" opacity="0.5"/>
    <!-- Tent pole top -->
    <circle cx="100" cy="-20" r="4" fill="#4ade80" opacity="0.8"/>
    <!-- Ground line -->
    <line x1="-20" y1="200" x2="220" y2="200" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Main power station body -->
  <g transform="translate(420, 130)">
    <!-- Main box with rounded corners -->
    <rect x="0" y="40" width="360" height="340" rx="20" ry="20" fill="url(#batteryBody)" opacity="0.95"/>
    <!-- Top handle -->
    <rect x="110" y="10" width="140" height="40" rx="12" ry="12" fill="#16a34a"/>
    <rect x="125" y="20" width="110" height="20" rx="8" ry="8" fill="#0f172a" opacity="0.4"/>

    <!-- Display screen area -->
    <rect x="40" y="70" width="280" height="80" rx="8" ry="8" fill="#0f172a" opacity="0.5"/>
    <!-- Battery level bars inside display -->
    <rect x="60" y="90" width="40" height="40" rx="4" ry="4" fill="#4ade80" opacity="0.9"/>
    <rect x="110" y="90" width="40" height="40" rx="4" ry="4" fill="#4ade80" opacity="0.9"/>
    <rect x="160" y="90" width="40" height="40" rx="4" ry="4" fill="#4ade80" opacity="0.9"/>
    <rect x="210" y="90" width="40" height="40" rx="4" ry="4" fill="#4ade80" opacity="0.4"/>
    <rect x="260" y="90" width="40" height="40" rx="4" ry="4" fill="#4ade80" opacity="0.15"/>

    <!-- AC Power outlet (left) -->
    <g transform="translate(55, 190)">
      <rect x="0" y="0" width="90" height="70" rx="10" ry="10" fill="#0f172a" opacity="0.5"/>
      <!-- Outlet holes -->
      <circle cx="30" cy="28" r="8" fill="#1e293b"/>
      <circle cx="60" cy="28" r="8" fill="#1e293b"/>
      <rect x="38" y="44" width="14" height="6" rx="3" ry="3" fill="#1e293b"/>
    </g>

    <!-- USB-A ports (middle) -->
    <g transform="translate(165, 190)">
      <rect x="0" y="0" width="50" height="24" rx="4" ry="4" fill="#0f172a" opacity="0.5"/>
      <rect x="8" y="5" width="34" height="14" rx="2" ry="2" fill="#1e293b"/>
      <rect x="0" y="34" width="50" height="24" rx="4" ry="4" fill="#0f172a" opacity="0.5"/>
      <rect x="8" y="39" width="34" height="14" rx="2" ry="2" fill="#1e293b"/>
    </g>

    <!-- USB-C port (right) -->
    <g transform="translate(235, 190)">
      <rect x="0" y="0" width="70" height="70" rx="10" ry="10" fill="#0f172a" opacity="0.5"/>
      <rect x="15" y="22" width="40" height="26" rx="10" ry="10" fill="#1e293b"/>
      <!-- USB-C label dot -->
      <circle cx="35" cy="12" r="4" fill="#4ade80" opacity="0.7"/>
    </g>

    <!-- Bottom ventilation grilles -->
    <g transform="translate(40, 290)" opacity="0.3">
      <rect x="0" y="0" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
      <rect x="0" y="10" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
      <rect x="0" y="20" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
      <rect x="0" y="30" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
      <rect x="0" y="40" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
      <rect x="0" y="50" width="280" height="4" rx="2" ry="2" fill="#0f172a"/>
    </g>

    <!-- Power button -->
    <circle cx="180" cy="360" r="14" fill="#0f172a" opacity="0.5"/>
    <circle cx="180" cy="360" r="9" fill="none" stroke="#4ade80" stroke-width="2.5" opacity="0.8"/>
    <line x1="180" y1="348" x2="180" y2="355" stroke="#4ade80" stroke-width="2.5" opacity="0.8"/>
  </g>

  <!-- Lightning bolt (right side accent) -->
  <g transform="translate(860, 180)">
    <polygon points="60,0 20,120 55,120 10,230 90,95 55,95 95,0" fill="url(#boltGlow)" opacity="0.85"/>
    <!-- Glow effect -->
    <polygon points="60,0 20,120 55,120 10,230 90,95 55,95 95,0" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Small decorative lightning sparks -->
  <g transform="translate(830, 420)" opacity="0.4">
    <polygon points="20,0 8,35 17,35 5,60 28,28 18,28 30,0" fill="#4ade80"/>
  </g>

  <!-- Energy flow lines (connecting tent to power station) -->
  <g stroke="#4ade80" stroke-width="2" opacity="0.25" fill="none" stroke-dasharray="8 6">
    <path d="M340,400 Q380,380 420,370"/>
    <path d="M340,430 Q380,410 420,400"/>
  </g>

  <!-- Small stars / sparkles -->
  <g fill="#ffffff" opacity="0.15">
    <polygon points="1050,200 1054,212 1066,212 1056,220 1060,232 1050,224 1040,232 1044,220 1034,212 1046,212"/>
    <polygon points="180,80 183,88 191,88 184,93 187,101 180,96 173,101 176,93 169,88 177,88" transform="scale(0.7)"/>
    <polygon points="1100,400 1103,408 1111,408 1104,413 1107,421 1100,416 1093,421 1096,413 1089,408 1097,408" transform="scale(0.8)"/>
  </g>

  <!-- Floating power indicators -->
  <circle cx="980" cy="315" r="18" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.3"/>
  <circle cx="980" cy="315" r="8" fill="#22c55e" opacity="0.2"/>
  <circle cx="1030" cy="270" r="12" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.2"/>
  <circle cx="1030" cy="270" r="5" fill="#4ade80" opacity="0.15"/>
</svg>